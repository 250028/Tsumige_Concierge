name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  ci:
    name: Type Check / Lint / Build
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Node.js をセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: 依存パッケージをインストール
        run: npm ci

      - name: Prisma クライアント生成
        run: npx prisma generate
        env:
          DATABASE_URL: "mysql://user:password@localhost:3306/dummy"

      - name: 型チェック（tsc）
        run: npx tsc --noEmit

      - name: Lint（ESLint）
        run: npm run lint

      - name: ビルド確認
        run: npm run build
        env:
          # ビルド時に必要な環境変数（ダミー値でOK）
          DATABASE_URL: "mysql://user:password@localhost:3306/dummy"
          GEMINI_API_KEY: "dummy"
          RAWG_API_KEY: "dummy"
          SESSION_SECRET: "dummy-secret-32-characters-long!!"